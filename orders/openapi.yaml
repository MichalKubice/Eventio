openapi: 3.0.3
info:
  title: Eventio Orders Service API
  description: Order management service for Eventio platform
  version: 1.0.0
  contact:
    name: Eventio Team

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Orders
    description: Order management endpoints

paths:
  /api/orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: Creates a new order for tickets with 15-minute reservation
      operationId: createOrder
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - quantity
              properties:
                eventId:
                  type: string
                  description: ID of the event/ticket to order
                  example: 620137287748018793f
                quantity:
                  type: integer
                  minimum: 1
                  description: Number of tickets to order
                  example: 2
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input or ticket not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Orders
      summary: List user's orders
      description: Retrieves all orders for the authenticated user
      operationId: listOrders
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of user's orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order details
      description: Retrieves details of a specific order
      operationId: getOrder
      security:
        - cookieAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
          description: Order ID
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not authorized to view this order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Orders
      summary: Cancel order
      description: Cancels an order and releases the ticket reservation
      operationId: cancelOrder
      security:
        - cookieAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
          description: Order ID
      responses:
        '204':
          description: Order cancelled successfully
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not authorized to cancel this order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          example: 620137287748018793f
        userId:
          type: string
          example: 620137287748018793f
        eventId:
          type: string
          example: 620137287748018793f
        quantity:
          type: integer
          example: 2
        pricePerTicket:
          type: number
          format: float
          example: 99.99
        totalAmount:
          type: number
          format: float
          description: Calculated as quantity * pricePerTicket
          example: 199.98
        status:
          type: string
          enum:
            - created
            - pending
            - accepted
            - rejected
            - completed
            - cancelled
            - expired
          example: pending
        expiresAt:
          type: string
          format: date-time
          description: Order expires 15 minutes after creation
          example: 2025-11-07T14:15:00Z
        version:
          type: integer
          example: 0

    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              field:
                type: string
